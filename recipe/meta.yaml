{% set name = "ollama" %}
{% set version = "0.6.2" %}

package:
  name: {{ name|lower }}-python
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/ollama-{{ version }}.tar.gz
  sha256: 936d55daa684f474364c098611c933626f8d6c7d67065c5b7ae0c477b508b07f

build:
  number: 0
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python
    - pip
    # hatch-vcs required by build-system.requires; reads version from sdist PKG-INFO
    - hatchling
    - hatch-vcs
  run:
    - python
    - httpx >=0.27
    - pydantic >=2.9

test:
  imports:
    - ollama
  commands:
    - pip check
  requires:
    - pip

about:
  home: https://github.com/ollama/ollama-python
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: The official Python client for Ollama.
  description: |
    Ollama Python library provides the easiest way to integrate Python 3.8+
    projects with Ollama, the tool for running large language models locally.
  doc_url: https://github.com/ollama/ollama-python
  dev_url: https://github.com/ollama/ollama-python

extra:
  recipe-maintainers:
    - apmorton
    - asmeurer
    - xkong-anaconda
